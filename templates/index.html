<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Glam Shelf · Support Twin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0a08;
      --surface: #131110;
      --surface-2: #1a1815;
      --surface-3: #221f1b;
      --gold: #c9a84c;
      --gold-soft: rgba(201, 168, 76, 0.12);
      --gold-ring: rgba(201, 168, 76, 0.35);
      --gold-dim: rgba(201, 168, 76, 0.55);
      --text: #e6e1d8;
      --muted: #7a7570;
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.1);

      --auto-bg: rgba(70, 140, 95, 0.16);
      --auto-border: rgba(120, 200, 145, 0.4);
      --auto-text: #6fc88f;

      --draft-bg: rgba(180, 140, 50, 0.18);
      --draft-border: rgba(220, 180, 90, 0.45);
      --draft-text: #d4b15a;

      --escalate-bg: rgba(180, 60, 70, 0.18);
      --escalate-border: rgba(220, 100, 110, 0.45);
      --escalate-text: #e26970;

      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "DM Sans", -apple-system, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---------- Header ---------- */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(11, 10, 8, 0.85);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand-block {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.4px solid var(--gold);
      background: var(--gold-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .wordmark {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.4px;
    }

    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      background: var(--gold-soft);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
    }

    .header-actions { margin-left: auto; }
    .signout {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 6px;
      transition: color 0.15s ease, background 0.15s ease;
    }
    .signout:hover { color: var(--gold); background: var(--surface); }

    /* ---------- Main grid ---------- */
    main {
      flex: 1;
      max-width: 1180px;
      margin: 0 auto;
      width: 100%;
      padding: 32px 24px 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 880px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    .panel h2 {
      font-family: var(--serif);
      font-weight: 500;
      font-size: 22px;
      letter-spacing: 0.3px;
      margin: 0 0 18px;
      color: var(--text);
    }

    /* ---------- Form fields ---------- */
    label {
      display: block;
      font-size: 12px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      resize: vertical;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-ring);
    }

    .char-count {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Order context accordion ---------- */
    details.accordion {
      margin: 18px 0 0;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    details.accordion summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      transition: color 0.15s ease;
      user-select: none;
    }
    details.accordion summary::-webkit-details-marker { display: none; }
    details.accordion summary:hover { color: var(--gold); }
    details.accordion summary .chev {
      transition: transform 0.18s ease;
    }
    details.accordion[open] summary .chev {
      transform: rotate(90deg);
      color: var(--gold);
    }
    details.accordion .accordion-body {
      margin-top: 12px;
    }

    /* ---------- Primary button ---------- */
    .primary-btn {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: var(--gold);
      color: #1a1612;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.6px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .primary-btn:hover:not(:disabled) { background: #d4b85d; }
    .primary-btn:active:not(:disabled) { transform: translateY(1px); }
    .primary-btn:disabled { opacity: 0.55; cursor: wait; }

    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #1a1612;
      border-top-color: transparent;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .primary-btn.loading .spinner { display: inline-block; }
    .primary-btn.loading .label::after { content: "…"; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; border-top-color: rgba(26, 22, 18, 0.3); }
    }

    .kbd-hint {
      margin-top: 10px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.4px;
    }
    kbd {
      font-family: var(--sans);
      font-size: 10px;
      padding: 2px 6px;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      color: var(--text);
    }

    /* ---------- Right panel: empty state ---------- */
    .empty-state {
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      gap: 14px;
    }
    .empty-state .pencil-icon {
      width: 48px;
      height: 48px;
      opacity: 0.55;
    }
    .empty-state p {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    /* ---------- Result panel ---------- */
    .result { display: none; }
    .result.visible { display: block; }

    .badge-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: 1px solid;
    }
    .badge.auto {
      background: var(--auto-bg);
      border-color: var(--auto-border);
      color: var(--auto-text);
    }
    .badge.draft {
      background: var(--draft-bg);
      border-color: var(--draft-border);
      color: var(--draft-text);
    }
    .badge.escalate {
      background: var(--escalate-bg);
      border-color: var(--escalate-border);
      color: var(--escalate-text);
    }
    .badge.unknown {
      background: var(--surface-2);
      border-color: var(--border-strong);
      color: var(--muted);
    }
    .elapsed { color: var(--muted); font-size: 12px; }

    .escalate-banner {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--escalate-bg);
      border: 1px solid var(--escalate-border);
      border-radius: 8px;
      color: var(--escalate-text);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .escalate-banner.visible { display: flex; gap: 10px; align-items: flex-start; }
    .escalate-banner svg { flex-shrink: 0; margin-top: 2px; }

    .reply-box {
      padding: 16px 18px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      white-space: pre-wrap;
      font-family: var(--sans);
      font-size: 14.5px;
      line-height: 1.6;
      letter-spacing: 0.1px;
    }

    /* ---------- Action row ---------- */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .action-btn {
      padding: 9px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .action-btn:hover:not(:disabled) {
      background: var(--surface-3);
      border-color: var(--gold-dim);
    }
    .action-btn.gold {
      background: var(--gold-soft);
      border-color: var(--gold-dim);
      color: var(--gold);
    }
    .action-btn.gold:hover:not(:disabled) {
      background: rgba(201, 168, 76, 0.18);
    }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-msg {
      margin-top: 10px;
      min-height: 18px;
      font-size: 12px;
      color: var(--muted);
    }
    .status-msg.success { color: var(--auto-text); }
    .status-msg.error { color: var(--escalate-text); }

    /* ---------- Footer ---------- */
    footer {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand-block">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="22" height="22" fill="none" stroke="#c9a84c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 22 Q 20 8, 34 22"/>
            <path d="M8 22 Q 20 30, 32 22"/>
            <circle cx="20" cy="22" r="2.4" fill="#c9a84c" stroke="none"/>
          </svg>
        </div>
        <div class="wordmark">The Glam Shelf</div>
        <div class="chip">Brain v1.6</div>
      </div>
      <div class="header-actions">
        <a href="{{ url_for('logout') }}" class="signout">Sign out</a>
      </div>
    </div>
  </header>

  <main>
    <div class="grid">

      <!-- LEFT: Customer message -->
      <section class="panel">
        <h2>Customer Message</h2>

        <label for="customer-message">WhatsApp Message</label>
        <textarea id="customer-message" rows="7"
          placeholder="Paste the customer's WhatsApp message here..." required></textarea>
        <div class="char-count"><span id="cm-count">0</span> characters</div>

        <details class="accordion" id="order-accordion">
          <summary>
            <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            Add order context (optional)
          </summary>
          <div class="accordion-body">
            <textarea id="order-context" rows="4"
              placeholder="Paste Shopify order details if relevant — order ID, product, status, etc."></textarea>
          </div>
        </details>

        <button type="button" class="primary-btn" id="submit-btn">
          <span class="spinner" aria-hidden="true"></span>
          <span class="label">Draft Reply</span>
        </button>
        <div class="kbd-hint"><kbd>⌘</kbd>/<kbd>Ctrl</kbd> + <kbd>Enter</kbd> to draft</div>
      </section>

      <!-- RIGHT: Drafted reply -->
      <section class="panel">
        <h2>Drafted Reply</h2>

        <div class="empty-state" id="empty-state">
          <svg class="pencil-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/>
          </svg>
          <p>Reply will appear here</p>
        </div>

        <div class="result" id="result">
          <div class="badge-row">
            <span class="badge" id="badge"></span>
            <span class="elapsed" id="elapsed"></span>
          </div>

          <div class="escalate-banner" id="escalate-banner">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
              <line x1="12" y1="9" x2="12" y2="13"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span>Forward to Udit — do not send yourself</span>
          </div>

          <div class="reply-box" id="reply-box"></div>

          <div class="actions">
            <button type="button" class="action-btn gold" id="copy-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
            <button type="button" class="action-btn" id="redraft-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              Re-draft
            </button>
            <button type="button" class="action-btn" id="clear-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              Clear
            </button>
          </div>
          <div class="status-msg" id="status-msg"></div>
        </div>
      </section>

    </div>
  </main>

  <footer>
    The Glam Shelf · Internal tool · For founder use only
  </footer>

  <script>
    const customerInput = document.getElementById("customer-message");
    const orderInput    = document.getElementById("order-context");
    const cmCount       = document.getElementById("cm-count");
    const submitBtn     = document.getElementById("submit-btn");
    const copyBtn       = document.getElementById("copy-btn");
    const redraftBtn    = document.getElementById("redraft-btn");
    const clearBtn      = document.getElementById("clear-btn");
    const emptyState    = document.getElementById("empty-state");
    const resultEl      = document.getElementById("result");
    const badgeEl       = document.getElementById("badge");
    const elapsedEl     = document.getElementById("elapsed");
    const replyBox      = document.getElementById("reply-box");
    const statusMsg     = document.getElementById("status-msg");
    const escalateBanner = document.getElementById("escalate-banner");
    const orderAccordion = document.getElementById("order-accordion");

    let currentReply = "";

    // Live character count
    customerInput.addEventListener("input", () => {
      cmCount.textContent = customerInput.value.length;
    });

    function setBusy(busy) {
      submitBtn.disabled  = busy;
      redraftBtn.disabled = busy;
      clearBtn.disabled   = busy;
      copyBtn.disabled    = busy || !currentReply;
      submitBtn.classList.toggle("loading", busy);
      submitBtn.querySelector(".label").textContent = busy ? "Drafting" : "Draft Reply";
      redraftBtn.querySelector("svg + *, svg") || null; // no-op guard
    }

    function showEmpty() {
      emptyState.style.display = "flex";
      resultEl.classList.remove("visible");
      currentReply = "";
      copyBtn.disabled = true;
    }

    function showError(msg) {
      emptyState.style.display = "flex";
      resultEl.classList.remove("visible");
      emptyState.innerHTML = `
        <svg class="pencil-icon" style="color: var(--escalate-text); opacity: 1;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p style="color: var(--escalate-text); white-space: pre-wrap; max-width: 100%; word-break: break-word;">${msg}</p>
      `;
    }

    function showResult(classification, reply, elapsedSec) {
      emptyState.style.display = "none";
      resultEl.classList.add("visible");

      badgeEl.textContent = classification;
      badgeEl.className = "badge";
      if (classification === "AUTO")               badgeEl.classList.add("auto");
      else if (classification === "DRAFT+APPROVE") badgeEl.classList.add("draft");
      else if (classification === "ESCALATE")      badgeEl.classList.add("escalate");
      else                                         badgeEl.classList.add("unknown");

      escalateBanner.classList.toggle("visible", classification === "ESCALATE");

      elapsedEl.textContent = `drafted in ${elapsedSec}s`;
      replyBox.textContent = reply;
      currentReply = reply;
      copyBtn.disabled = false;

      statusMsg.textContent = "";
      statusMsg.className = "status-msg";
    }

    async function submitDraft() {
      const customerMessage = customerInput.value.trim();
      const orderContext    = orderInput.value.trim();

      if (!customerMessage) {
        customerInput.focus();
        return;
      }

      setBusy(true);
      const start = Date.now();
      console.log("[UI] POST /api/draft");

      try {
        const response = await fetch("/api/draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            customer_message: customerMessage,
            order_context: orderContext,
          }),
        });

        const elapsed = ((Date.now() - start) / 1000).toFixed(1);

        if (response.status === 401) {
          // Session expired — bounce to login.
          window.location.href = "/login";
          return;
        }

        const data = await response.json();
        console.log(`[UI] ${response.status} in ${elapsed}s`, data);

        if (!response.ok) {
          showError(`Server error: ${data.error || "Unknown error"}`);
          return;
        }

        let parsed;
        try {
          parsed = JSON.parse(data.raw);
        } catch (parseErr) {
          console.error("[UI] JSON parse error:", parseErr, "raw:", data.raw);
          showError(`Claude returned invalid JSON.\n\n${data.raw}`);
          return;
        }

        const { classification, reply } = parsed;
        if (!classification || !reply) {
          showError(`Missing classification or reply.\n\n${data.raw}`);
          return;
        }

        showResult(classification, reply, elapsed);
      } catch (err) {
        console.error("[UI] Fetch failed:", err);
        showError(`Network error: ${err.message}`);
      } finally {
        setBusy(false);
      }
    }

    submitBtn.addEventListener("click", submitDraft);
    redraftBtn.addEventListener("click", submitDraft);

    clearBtn.addEventListener("click", () => {
      customerInput.value = "";
      orderInput.value = "";
      cmCount.textContent = "0";
      // Reset empty state to default content
      emptyState.innerHTML = `
        <svg class="pencil-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/>
        </svg>
        <p>Reply will appear here</p>
      `;
      showEmpty();
      orderAccordion.open = false;
      customerInput.focus();
    });

    copyBtn.addEventListener("click", async () => {
      if (!currentReply) return;
      try {
        await navigator.clipboard.writeText(currentReply);
        statusMsg.textContent = "Copied to clipboard";
        statusMsg.className = "status-msg success";
        setTimeout(() => {
          statusMsg.textContent = "";
          statusMsg.className = "status-msg";
        }, 2000);
      } catch (err) {
        statusMsg.textContent = `Copy failed: ${err.message}`;
        statusMsg.className = "status-msg error";
      }
    });

    // Cmd/Ctrl + Enter shortcut from either textarea.
    [customerInput, orderInput].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          submitDraft();
        }
      });
    });
  </script>
</body>
</html>
